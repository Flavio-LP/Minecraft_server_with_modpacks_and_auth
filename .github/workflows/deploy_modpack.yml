name: Deploy Modpack to download

on:
  push:
    branches:
      - main 
jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST_MODPACK }}
          username: ${{ secrets.SSH_USER_MODPACK }}
          key: ${{ secrets.SSH_PRIVATE_KEY_MODPACK }}
          script: |
            cd /home/ubuntu/minecraft/Minecraft_server_with_modpacks_and_auth
            git pull origin -u main
            packwiz refresh
            packwiz modrinth export
            echo "✅ Arquivo compilado com sucesso"